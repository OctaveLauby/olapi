name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    # Only run for PRs raised from branches in this repository, not from forks.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run CI
        run: make ci
