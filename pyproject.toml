[tool.uv.workspace]
members = ["apps/*", "libs/*"]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "pyright>=1.1.350",
    "types-python-jose>=3.3",
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
testpaths = ["libs"]
addopts = ["--import-mode=importlib"]  # avoid test name conflict between libraries

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    # https://docs.astral.sh/ruff/rules/
    "ARG", # unused arguments
    "E",   # pycodestyle
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "I",   # isort
    "Q",   # quotes
]
ignore = ["B008"] # function-call-in-default-argument (for fastapi Depends)

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"
include = ["apps", "libs"]

[[tool.pyright.executionEnvironments]]
root = "apps/olapi"
